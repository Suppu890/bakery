<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Anytime Fresh Bake</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #FFF8F0;
            --soft-beige: #F5E6D3;
            --chocolate-brown: #4E342E;
            --bakery-gold: #D4A017;
            --warm-orange: #FF8C42;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--warm-orange), var(--bakery-gold));
            min-height: 100vh;
            color: var(--chocolate-brown);
        }
        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 450px;
            width: 100%;
        }
        .dashboard-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            padding: 30px;
            margin-top: 30px;
        }
        .btn-orange {
            background: linear-gradient(90deg, var(--warm-orange), var(--bakery-gold));
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            padding: 12px;
            transition: all 0.3s ease;
        }
        .btn-orange:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 140, 66, 0.3);
            color: white;
        }
        .form-control {
            border-radius: 10px;
            padding: 10px 15px;
            border: 1px solid rgba(78, 52, 46, 0.2);
        }
        .form-control:focus {
            box-shadow: 0 0 0 3px rgba(214, 160, 23, 0.2);
            border-color: var(--bakery-gold);
        }
    </style>
</head>
<body>

    <!-- 1. LOGIN INTERFACE CONTAINER -->
    <div id="loginSection" class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="login-card text-center">
            <h2 style="font-family: 'Playfair Display', serif; font-weight: 700;">🍰 Admin Panel</h2>
            <p class="text-muted mb-4">Anytime Fresh Bake Bakery</p>
            
            <div id="errorMessage" class="alert alert-danger d-none" role="alert">
                Invalid Username or Password!
            </div>

            <form onsubmit="handleStaticLogin(event)">
                <div class="mb-3 text-start">
                    <label class="form-label fw-semibold">Username</label>
                    <input type="text" id="usernameInput" class="form-control" placeholder="admin" required>
                </div>
                <div class="mb-4 text-start">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" id="passwordInput" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-orange w-100 mb-3"><i class="fa-solid fa-right-to-bracket me-2"></i>Login</button>
            </form>
            <small class="text-muted d-block">Default: admin / admin123</small>
        </div>
    </div>

    <!-- 2. FULL WORKING LOGGED-IN DASHBOARD INTERFACE -->
    <div id="dashboardSection" class="container py-5 d-none">
        <div class="d-flex justify-content-between align-items-center bg-white p-4 rounded-4 shadow-sm mb-4">
            <div>
                <h2 class="mb-0" style="font-family: 'Playfair Display', serif;">🧁 Management Dashboard</h2>
                <span class="text-muted">Welcome back, Admin</span>
            </div>
            <button class="btn btn-outline-danger btn-sm px-3 py-2 rounded-pill" onclick="handleLogout()">
                <i class="fa-solid fa-power-off me-2"></i>Logout
            </button>
        </div>

        <div class="row g-4">
            <!-- Left Form Column -->
            <div class="col-lg-5">
                <div class="dashboard-card">
                    <h4 class="mb-4 fw-bold"><i class="fa-solid fa-plus me-2 text-warning"></i>Add New Dish</h4>
                    <form id="dishForm" onsubmit="addMenuDish(event)">
                        <div class="mb-3">
                            <label class="form-label">Dish Title</label>
                            <input type="text" id="dishTitle" class="form-control" placeholder="Black Forest Cake" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Category</label>
                            <select id="dishCategory" class="form-select form-control" required>
                                <option value="bakery">Bakery (Sweet treats & Cakes)</option>
                                <option value="fastfood">Fast Food (Burgers & Pizzas)</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Image URL</label>
                            <input type="url" id="dishImage" class="form-control" placeholder="https://images.unsplash.com/..." required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Short Description</label>
                            <textarea id="dishDesc" class="form-control" rows="3" placeholder="Freshly baked dark chocolate sponge..." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-orange w-100">Add Dish to Live Menu</button>
                    </form>
                </div>
            </div>

            <!-- Right List Column -->
            <div class="col-lg-7">
                <div class="dashboard-card">
                    <h4 class="mb-4 fw-bold"><i class="fa-solid fa-utensils me-2 text-warning"></i>Live Website Menu Items</h4>
                    <div class="table-responsive">
                        <table class="table align-middle text-center table-hover">
                            <thead class="table-dark">
                                <tr>
                                    <th class="text-start">Name</th>
                                    <th>Category</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="menuTableBody">
                                <!-- Appended JavaScript Rows Go Here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Default base items to match website launch sequence
        const starterDishes = [
            { id: 1, title: "Premium Designer Cakes", category: "bakery", image: "https://images.unsplash.com/photo-1578985545062-69928b1d9587?auto=format&fit=crop&q=80&w=600", description: "Custom gourmet cakes crafted flawlessly for birthdays and celebrations." },
            { id: 2, title: "Rich Cream Pastries", category: "bakery", image: "https://images.unsplash.com/photo-1551024601-bec78aea704b?auto=format&fit=crop&q=80&w=600", description: "Mouth-watering cream slices available in delicious dark chocolate profiles." },
            { id: 3, title: "Cheesy Pan Pizzas", category: "fastfood", image: "https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&q=80&w=600", description: "Artisan pulled bases loaded with robust cheese layers and fresh toppings." },
            { id: 4, title: "Gourmet Grilled Burgers", category: "fastfood", image: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&q=80&w=600", description: "Crisp seasoned veggie patties nested inside fresh house brioche sesame buns." }
        ];

        // Safe Login Verification
        function handleStaticLogin(e) {
            e.preventDefault();
            const user = document.getElementById('usernameInput').value;
            const pass = document.getElementById('passwordInput').value;
            const errDiv = document.getElementById('errorMessage');

            if (user === "admin" && pass === "admin123") {
                errDiv.classList.add('d-none');
                document.getElementById('loginSection').classList.add('d-none');
                document.getElementById('dashboardSection').classList.remove('d-none');
                
                // Initialize local data cache
                if (!localStorage.getItem('bakeryMenu')) {
                    localStorage.setItem('bakeryMenu', JSON.stringify(starterDishes));
                }
                refreshTable();
            } else {
                errDiv.classList.remove('d-none');
            }
        }

        function handleLogout() {
            document.getElementById('dashboardSection').classList.add('d-none');
            document.getElementById('loginSection').classList.remove('d-none');
            document.getElementById('usernameInput').value = "";
            document.getElementById('passwordInput').value = "";
        }

        function addMenuDish(e) {
            e.preventDefault();
            const currentMenu = JSON.parse(localStorage.getItem('bakeryMenu')) || [];
            
            const item = {
                id: Date.now(),
                title: document.getElementById('dishTitle').value,
                category: document.getElementById('dishCategory').value,
                image: document.getElementById('dishImage').value,
                description: document.getElementById('dishDesc').value
            };

            currentMenu.push(item);
            localStorage.setItem('bakeryMenu', JSON.stringify(currentMenu));
            document.getElementById('dishForm').reset();
            refreshTable();
            alert("Success! Dish added to browser storage.");
        }

        function removeDish(id) {
            if (confirm("Delete this menu item?")) {
                let currentMenu = JSON.parse(localStorage.getItem('bakeryMenu')) || [];
                currentMenu = currentMenu.filter(dish => dish.id !== id);
                localStorage.setItem('bakeryMenu', JSON.stringify(currentMenu));
                refreshTable();
            }
        }

        function refreshTable() {
            const tbody = document.getElementById('menuTableBody');
            const currentMenu = JSON.parse(localStorage.getItem('bakeryMenu')) || [];
            tbody.innerHTML = "";

            currentMenu.forEach(dish => {
                tbody.innerHTML += `
                    <tr>
                        <td class="fw-bold text-dark text-start">${dish.title}</td>
                        <td><span class="badge bg-secondary text-uppercase">${dish.category}</span></td>
                        <td>
                            <button class="btn btn-sm btn-danger px-2 py-1" onclick="removeDish(${dish.id})">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
        }
    </script>
</body>
</html>
